name: Gateway Dependabot CI

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  packages: read

env:
  SQLX_OFFLINE: "true"

jobs:
  checks:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Checkout gateway (PR head)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
      - name: Install rustfmt & clippy
        run: rustup component add rustfmt clippy
      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libcurl4-openssl-dev
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - name: Run fmt
        run: cargo fmt --package gateway --check
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Enforce LOC limit
        run: python3 scripts/loc_check.py 250 rs
      - name: Run tests
        run: cargo test --all-targets --all-features

  docker-build:
    runs-on: ubuntu-latest
    needs: checks
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Checkout gateway (PR head)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          tags: gateway:dependabot-${{ github.sha }}
