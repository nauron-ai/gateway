name: Gateway CI
on:
  push:
    branches: [main]
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"
    paths-ignore:
      - "README.md"
      - "CHANGELOG.md"
      - "LICENSE"
      - "NOTICE"
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "CHANGELOG.md"
      - "LICENSE"
      - "NOTICE"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: gateway-${{ github.ref }}
  cancel-in-progress: true

env:
  SQLX_OFFLINE: "true"
jobs:
  checks:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout gateway
        uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
      - name: Install rustfmt & clippy
        run: rustup component add rustfmt clippy
      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libcurl4-openssl-dev
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          workspaces: .
      - name: Run fmt
        run: cargo fmt --package gateway --check
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Enforce LOC limit
        run: python3 scripts/loc_check.py 250 rs
      - name: Run tests
        run: cargo test --all-targets --all-features
  build-amd64:
    runs-on: ubuntu-latest
    needs: checks
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout gateway
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        if: github.ref_type == 'tag'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build amd64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: ${{ github.ref_type == 'tag' }}
          tags: ${{ github.ref_type == 'tag' && format('ghcr.io/{0}/gateway:{1}-amd64', github.repository_owner, github.ref_name) || format('gateway:ci-amd64-{0}', github.sha) }}
          cache-from: type=gha,scope=gateway-amd64
          cache-to: type=gha,scope=gateway-amd64,mode=max
  build-arm64:
    runs-on: ubuntu-24.04-arm
    needs: checks
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout gateway
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        if: github.ref_type == 'tag'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build arm64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: ${{ github.ref_type == 'tag' }}
          tags: ${{ github.ref_type == 'tag' && format('ghcr.io/{0}/gateway:{1}-arm64', github.repository_owner, github.ref_name) || format('gateway:ci-arm64-{0}', github.sha) }}
          cache-from: type=gha,scope=gateway-arm64
          cache-to: type=gha,scope=gateway-arm64,mode=max
  publish-ghcr-manifest:
    runs-on: ubuntu-latest
    needs: [checks, build-amd64, build-arm64]
    if: github.ref_type == 'tag'
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish multi-arch tags
        run: docker buildx imagetools create --tag ghcr.io/${{ github.repository_owner }}/gateway:${{ github.ref_name }} ghcr.io/${{ github.repository_owner }}/gateway:${{ github.ref_name }}-amd64 ghcr.io/${{ github.repository_owner }}/gateway:${{ github.ref_name }}-arm64
